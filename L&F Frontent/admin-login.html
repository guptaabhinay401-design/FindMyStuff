<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | FindMyStuff</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-gray-900 via-slate-900 to-gray-950 min-h-screen flex items-center justify-center p-3 sm:p-6">

<div class="bg-white w-full max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl">

    <a href="index.html" class="text-sm text-gray-600 font-medium hover:text-black">
        ← Back to Home
    </a>

    <div class="text-center mt-4">
        <div class="w-16 h-16 mx-auto bg-red-100 text-red-600 flex items-center justify-center rounded-full mb-4">
            <i class="fa-solid fa-user-shield text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Admin Login</h2>
        <p class="text-sm text-gray-500 mt-1">Authorized personnel only</p>
    </div>

    <form id="adminLoginForm" class="mt-6 space-y-4">
        <div id="adminStatus" class="hidden rounded-lg border px-4 py-2 text-sm font-medium" role="status" aria-live="polite"></div>

        <div>
            <label class="text-sm font-medium text-gray-700">Admin Email</label>
            <div class="relative mt-1">
                <input id="adminEmail" type="email" required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none"
                placeholder="Enter admin email">
                <i class="fa-solid fa-envelope absolute right-3 top-3 text-gray-400"></i>
            </div>
        </div>

        <div>
            <label class="text-sm font-medium text-gray-700">Password</label>
            <div class="relative mt-1">
                <input id="adminPassword" type="password" required
                class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-500 outline-none"
                placeholder="Enter password">
                <i class="fa-solid fa-lock absolute right-3 top-3 text-gray-400"></i>
            </div>
        </div>

        <button id="adminLoginBtn" type="submit"
        class="w-full bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg font-semibold transition">
            Login as Admin
        </button>
    </form>

</div>

<script src="js/auth-client.js"></script>
<script>
const API_BASE = window.LFAuth.API_BASE;
const adminLoginForm = document.getElementById("adminLoginForm");
const adminStatus = document.getElementById("adminStatus");
const adminLoginBtn = document.getElementById("adminLoginBtn");

function showStatus(message, type) {
    adminStatus.textContent = message;
    adminStatus.className = "rounded-lg border px-4 py-2 text-sm font-medium";

    if (type === "success") {
        adminStatus.classList.add("border-green-200", "bg-green-50", "text-green-700");
        return;
    }

    if (type === "error") {
        adminStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
        return;
    }

    adminStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
}

function clearSession() {
    localStorage.removeItem("lf_auth_token");
    localStorage.removeItem("lf_auth_user");
    localStorage.removeItem("lf_profile_photo");
    localStorage.removeItem("lf_profile_image");
    localStorage.removeItem("lf_user_dp");
    localStorage.removeItem("lf_user_avatar");
}

adminLoginForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    adminLoginBtn.disabled = true;
    adminLoginBtn.textContent = "Logging in...";
    showStatus("Checking admin access...", "info");

    const payload = {
        email: document.getElementById("adminEmail").value.trim(),
        password: document.getElementById("adminPassword").value
    };

    try {
        const response = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Admin login failed");
        }

        if (!result.user || result.user.role !== "admin") {
            clearSession();
            throw new Error("This account does not have admin access");
        }

        const storedUser = Object.assign({}, result.user);
        const profileImage = typeof result.user.profileImage === "string" ? result.user.profileImage.trim() : "";
        if (profileImage.startsWith("data:")) {
            storedUser.profileImage = "";
        }

        localStorage.setItem("lf_auth_token", result.token);
        localStorage.setItem("lf_auth_user", JSON.stringify(storedUser));

        if (profileImage && !profileImage.startsWith("data:")) {
            localStorage.setItem("lf_profile_photo", profileImage);
            localStorage.setItem("lf_profile_image", profileImage);
            localStorage.setItem("lf_user_dp", profileImage);
            localStorage.setItem("lf_user_avatar", profileImage);
        } else {
            localStorage.removeItem("lf_profile_photo");
            localStorage.removeItem("lf_profile_image");
            localStorage.removeItem("lf_user_dp");
            localStorage.removeItem("lf_user_avatar");
        }

        showStatus("Admin login successful. Redirecting...", "success");
        setTimeout(function () {
            window.location.href = "admin-dashboard.html";
        }, 700);
    } catch (error) {
        clearSession();
        showStatus(error.message || "Admin login failed", "error");
    } finally {
        adminLoginBtn.disabled = false;
        adminLoginBtn.textContent = "Login as Admin";
    }
});
</script>

</body>
</html>
