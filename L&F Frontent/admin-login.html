<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | FindMyStuff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0a1628 0%,#0f2347 50%,#0c1d3a 100%);display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#fff;border-radius:24px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.35);}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#64748b;text-decoration:none;font-weight:500;margin-bottom:24px;transition:color .15s;}
.back-link:hover{color:#0f172a;}
.icon-wrap{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#0f3460,#1d4ed8);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.icon-wrap svg{width:28px;height:28px;color:#fff;}
h1{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:#0f172a;text-align:center;}
.subtitle{font-size:13px;color:#64748b;text-align:center;margin-top:4px;}
.label{display:block;font-size:12.5px;font-weight:600;color:#374151;margin-bottom:6px;}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;color:#0f172a;background:#fafbfc;outline:none;transition:border-color .15s;}
.inp:focus{border-color:#3b82f6;background:#fff;}
.inp-wrap{position:relative;}
.inp-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:#94a3b8;}
.inp-icon svg{width:16px;height:16px;}
.form-group{margin-bottom:16px;}
.btn-submit{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,#0f3460,#1d4ed8);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:8px;transition:opacity .15s;letter-spacing:.01em;}
.btn-submit:hover{opacity:.9;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.status-box{padding:10px 14px;border-radius:11px;font-size:13px;font-weight:500;margin-bottom:14px;display:none;}
.status-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
.status-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;}
.status-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;}
.divider{height:1px;background:#f1f5f9;margin:20px 0;}
.security-note{display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8;}
.security-note svg{width:14px;height:14px;flex-shrink:0;}
</style>
</head>
<body>

<div class="card">
  <a href="index.html" class="back-link">
    <svg style="width:15px;height:15px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Home
  </a>

  <div class="icon-wrap">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  </div>

  <h1>Admin Access</h1>
  <p class="subtitle">Authorized personnel only · FindMyStuff</p>

  <div style="height:24px;"></div>

  <div id="statusBox" class="status-box"></div>

  <form id="adminLoginForm" autocomplete="on">
    <div class="form-group">
      <label class="label" for="adminEmail">Admin Email</label>
      <div class="inp-wrap">
        <input id="adminEmail" class="inp" type="email" required placeholder="Enter admin email" autocomplete="username" name="email" style="padding-right:38px;">
        <span class="inp-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:0;">
      <label class="label" for="adminPassword">Password</label>
      <div class="inp-wrap">
        <input id="adminPassword" class="inp" type="password" required placeholder="Enter password" autocomplete="current-password" name="password" style="padding-right:38px;">
        <button type="button" id="togglePwdBtn" onclick="togglePwd()" style="position:absolute;right:11px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:#94a3b8;padding:2px;">
          <svg id="eyeIcon" style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button id="loginBtn" type="submit" class="btn-submit">Login as Admin</button>
  </form>

  <div class="divider"></div>
  <div class="security-note">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    This portal is secured. All access attempts are logged.
  </div>
</div>

<script src="js/auth-client.js"></script>
<script>
const API_BASE = window.LFAuth.API_BASE;

function showStatus(msg, type) {
  const el = document.getElementById('statusBox');
  el.textContent = msg;
  el.className = 'status-box status-' + type;
  el.style.display = 'block';
}

function hideStatus() {
  document.getElementById('statusBox').style.display = 'none';
}

function togglePwd() {
  const inp = document.getElementById('adminPassword');
  const icon = document.getElementById('eyeIcon');
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  icon.innerHTML = isPass
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function clearSession() {
  ['lf_auth_token','lf_auth_user','lf_profile_photo','lf_profile_image','lf_user_dp','lf_user_avatar'].forEach(k => localStorage.removeItem(k));
}

document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Verifying...';
  showStatus('Checking admin credentials…', 'info');

  const payload = {
    email: document.getElementById('adminEmail').value.trim(),
    password: document.getElementById('adminPassword').value
  };

  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const result = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(result.message || 'Login failed');
    if (!result.user || result.user.role !== 'admin') {
      clearSession();
      throw new Error('This account does not have admin privileges');
    }

    const storedUser = {...result.user};
    const img = typeof result.user.profileImage === 'string' ? result.user.profileImage.trim() : '';
    if (img.startsWith('data:')) storedUser.profileImage = '';

    localStorage.setItem('lf_auth_token', result.token);
    localStorage.setItem('lf_auth_user', JSON.stringify(storedUser));
    if (img && !img.startsWith('data:')) {
      ['lf_profile_photo','lf_profile_image','lf_user_dp','lf_user_avatar'].forEach(k => localStorage.setItem(k, img));
    } else {
      ['lf_profile_photo','lf_profile_image','lf_user_dp','lf_user_avatar'].forEach(k => localStorage.removeItem(k));
    }

    showStatus('✓ Login successful — redirecting to dashboard…', 'success');
    setTimeout(() => window.location.href = 'admin-dashboard.html', 700);
  } catch(err) {
    clearSession();
    showStatus(err.message || 'Login failed', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login as Admin';
  }
});
</script>
</body>
</html>
