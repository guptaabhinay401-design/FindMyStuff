<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password | FindMyStuff</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 p-4 sm:p-6">

<main class="mx-auto max-w-xl rounded-2xl bg-white p-6 shadow-xl sm:p-8">
    <a href="profile.html" class="text-sm font-medium text-blue-600 hover:underline">← Back to Profile</a>

    <div class="mt-4">
        <h1 class="text-2xl font-bold text-slate-800">Change Password</h1>
        <p class="mt-1 text-sm text-slate-500">Keep your account secure by updating your password.</p>
    </div>

    <form id="changePasswordForm" class="mt-6 space-y-4">
        <div id="passwordStatus" class="hidden rounded-lg border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>

        <div>
            <label for="currentPassword" class="mb-1 block text-sm font-medium text-slate-700">Current Password</label>
            <input id="currentPassword" type="password" required class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="newPassword" class="mb-1 block text-sm font-medium text-slate-700">New Password</label>
            <input id="newPassword" type="password" required minlength="6" class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="confirmPassword" class="mb-1 block text-sm font-medium text-slate-700">Confirm New Password</label>
            <input id="confirmPassword" type="password" required minlength="6" class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button id="changePasswordBtn" type="submit" class="w-full rounded-lg bg-blue-600 py-3 text-sm font-semibold text-white hover:bg-blue-700">
            Update Password
        </button>
    </form>
</main>

<script src="js/auth-client.js"></script>
<script>
const API_BASE = window.LFAuth.API_BASE;
const changePasswordForm = document.getElementById("changePasswordForm");
const passwordStatus = document.getElementById("passwordStatus");
const changePasswordBtn = document.getElementById("changePasswordBtn");

function showStatus(message, type) {
    passwordStatus.textContent = message;
    passwordStatus.className = "rounded-lg border px-4 py-3 text-sm font-medium";

    if (type === "success") {
        passwordStatus.classList.add("border-green-200", "bg-green-50", "text-green-700");
        return;
    }

    if (type === "error") {
        passwordStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
        return;
    }

    passwordStatus.classList.add("border-blue-200", "bg-blue-50", "text-blue-700");
}

changePasswordForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    const token = localStorage.getItem("lf_auth_token");
    if (!token) {
        window.location.href = "login.html";
        return;
    }

    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
        showStatus("New password and confirm password must match.", "error");
        return;
    }

    changePasswordBtn.disabled = true;
    changePasswordBtn.textContent = "Updating...";
    showStatus("Updating password...", "info");

    try {
        const response = await fetch(API_BASE + "/auth/change-password", {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token
            },
            body: JSON.stringify({
                currentPassword: currentPassword,
                newPassword: newPassword
            })
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Could not change password");
        }

        changePasswordForm.reset();
        showStatus("Password updated successfully.", "success");
    } catch (error) {
        showStatus(error.message || "Could not change password.", "error");
    } finally {
        changePasswordBtn.disabled = false;
        changePasswordBtn.textContent = "Update Password";
    }
});
</script>

</body>
</html>
