<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | FindMyStuff</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 p-4 sm:p-6">

<main class="mx-auto max-w-xl rounded-2xl bg-white p-6 shadow-xl sm:p-8">
    <a href="login.html" class="text-sm font-medium text-blue-600 hover:underline">← Back to Login</a>

    <div class="mt-4">
        <h1 class="text-2xl font-bold text-slate-800">Forgot Password</h1>
        <p class="mt-2 text-sm text-slate-600">
            Enter your email address. The backend will generate a reset token and send a reset link.
        </p>
    </div>

    <form id="forgotPasswordForm" class="mt-6 space-y-4">
        <div id="forgotStatus" class="hidden rounded-lg border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>

        <div>
            <label for="email" class="mb-1 block text-sm font-medium text-slate-700">Email</label>
            <input id="email" type="email" required class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button id="forgotBtn" type="submit" class="w-full rounded-lg bg-blue-600 py-3 text-sm font-semibold text-white hover:bg-blue-700">
            Send Reset Link
        </button>
    </form>

    <div id="resetPreview" class="mt-4 hidden rounded-xl border border-dashed border-slate-300 bg-slate-50 p-4 text-sm text-slate-600"></div>
</main>

<script src="js/auth-client.js"></script>
<script>
const forgotPasswordForm = document.getElementById("forgotPasswordForm");
const forgotStatus = document.getElementById("forgotStatus");
const forgotBtn = document.getElementById("forgotBtn");
const resetPreview = document.getElementById("resetPreview");
const API_BASE = window.LFAuth.API_BASE;

function showStatus(message, type) {
    forgotStatus.textContent = message;
    forgotStatus.className = "rounded-lg border px-4 py-3 text-sm font-medium";

    if (type === "success") {
        forgotStatus.classList.add("border-green-200", "bg-green-50", "text-green-700");
        return;
    }

    if (type === "error") {
        forgotStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
        return;
    }

    forgotStatus.classList.add("border-blue-200", "bg-blue-50", "text-blue-700");
}

forgotPasswordForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    forgotBtn.disabled = true;
    forgotBtn.textContent = "Sending...";
    resetPreview.classList.add("hidden");
    resetPreview.textContent = "";
    showStatus("Starting password reset...", "info");

    try {
        const response = await fetch(API_BASE + "/auth/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: document.getElementById("email").value.trim()
            })
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Could not send reset link");
        }

        showStatus(result.message || "Reset link sent", "success");
        if (result.resetUrl) {
            resetPreview.classList.remove("hidden");
            resetPreview.textContent = "SMTP not configured. Development reset link:";
            const link = document.createElement("a");
            link.href = result.resetUrl;
            link.className = "mt-2 block break-all text-blue-600 underline";
            link.textContent = result.resetUrl;
            resetPreview.appendChild(link);
        }
    } catch (error) {
        showStatus(error.message || "Could not send reset link", "error");
    } finally {
        forgotBtn.disabled = false;
        forgotBtn.textContent = "Send Reset Link";
    }
});
</script>

</body>
</html>
