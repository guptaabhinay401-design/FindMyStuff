<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login | FindMyStuff</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center p-6">

<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl">

    <!-- Back -->
    <a href="index.html" class="text-sm text-blue-600 font-medium hover:underline">
        ← Back to Home
    </a>

    <!-- Header -->
    <div class="text-center mt-4">
        <div class="w-16 h-16 mx-auto bg-blue-100 text-blue-600 flex items-center justify-center rounded-full mb-4">
            <i class="fa-solid fa-user text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-[#1e3a8a]">Student Login</h2>
        <p class="text-sm text-gray-500 mt-1">Login to access your dashboard</p>
    </div>

    <!-- Form -->
    <form id="loginForm" class="mt-6 space-y-4">

        <div id="loginStatus" class="hidden rounded-lg border px-4 py-2 text-sm font-medium" role="status" aria-live="polite"></div>

        <!-- Email -->
        <div>
            <label class="text-sm font-medium text-gray-700">Email</label>
            <input id="email" type="email" required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            placeholder="Enter your email">
        </div>

        <!-- Password -->
        <div>
            <label class="text-sm font-medium text-gray-700">Password</label>
            <div class="relative">
                <input id="password" type="password" required
                class="w-full rounded-lg border px-4 py-2 pr-11 focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="Enter your password">
                <button id="togglePassword" type="button" class="absolute inset-y-0 right-0 px-3 text-gray-500 hover:text-blue-600" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2">
                <input type="checkbox" class="accent-blue-600">
                Remember Me
            </label>

            <a href="forgot-password.html"
            class="text-blue-600 hover:underline">
                Forgot Password?
            </a>
        </div>

        <!-- Login Button -->
        <button id="loginBtn" type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-semibold transition">
            Login
        </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
        <div class="flex-1 border-b"></div>
        <span class="px-3 text-gray-400 text-sm">OR</span>
        <div class="flex-1 border-b"></div>
    </div>

    <div class="space-y-3">
        <button id="googleLoginBtn" type="button" class="w-full flex items-center justify-center gap-3 border py-2.5 rounded-lg hover:bg-gray-50 transition">
            <i class="fa-brands fa-google text-red-500 text-lg"></i>
            Continue with Google
        </button>

        <button id="appleLoginBtn" type="button" class="w-full flex items-center justify-center gap-3 border py-2.5 rounded-lg hover:bg-gray-50 transition">
            <i class="fa-brands fa-apple text-black text-lg"></i>
            Continue with Apple
        </button>
    </div>

    <!-- Signup -->
    <p class="text-center text-sm text-gray-500">
        Don’t have an account?
        <a href="signup.html" class="text-blue-600 font-medium hover:underline">
            Sign Up
        </a>
    </p>

    <!-- Admin Link -->
    <p class="text-center text-xs text-gray-400 mt-4">
        Admin?
        <a href="admin-login.html" class="text-blue-600 hover:underline">
            Login Here
        </a>
    </p>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/auth-client.js"></script>
<script>
const loginForm = document.getElementById("loginForm");
const loginStatus = document.getElementById("loginStatus");
const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const togglePasswordBtn = document.getElementById("togglePassword");
const googleLoginBtn = document.getElementById("googleLoginBtn");
const appleLoginBtn = document.getElementById("appleLoginBtn");
const API_BASE = window.LFAuth.API_BASE;

const prefillEmail = localStorage.getItem("lf_prefill_email");
if (prefillEmail) {
    emailInput.value = prefillEmail;
}

function showStatus(message, type) {
    loginStatus.textContent = message;
    loginStatus.className = "rounded-lg border px-4 py-2 text-sm font-medium";

    if (type === "success") {
        loginStatus.classList.add("border-green-200", "bg-green-50", "text-green-700");
        return;
    }

    if (type === "error") {
        loginStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
        return;
    }

    loginStatus.classList.add("border-blue-200", "bg-blue-50", "text-blue-700");
}

loginForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";
    showStatus("Validating credentials...", "info");

    const payload = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Login failed");
        }

        window.LFAuth.persistAuthSession(result.user, result.token);

        showStatus("Login successful. Redirecting...", "success");
        sessionStorage.setItem("lf_toast", JSON.stringify({
            type: "login",
            title: "Welcome back! 👋",
            message: "You have successfully logged in to FindMyStuff."
        }));
        setTimeout(function () {
            window.location.href = "index.html";
        }, 700);
    } catch (error) {
        showStatus(error.message || "Could not login.", "error");
    } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
    }
});

togglePasswordBtn.addEventListener("click", function () {
    const isPassword = passwordInput.type === "password";
    passwordInput.type = isPassword ? "text" : "password";
    togglePasswordBtn.innerHTML = '<i class="fa-solid ' + (isPassword ? "fa-eye-slash" : "fa-eye") + '"></i>';
    togglePasswordBtn.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
});

async function loginWithGoogleCredential(credential) {
    showStatus("Completing Google login...", "info");

    const response = await fetch(API_BASE + "/auth/oauth/google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential: credential })
    });

    const result = await response.json().catch(function () {
        return {};
    });

    if (!response.ok) {
        throw new Error(result.message || "Google login failed");
    }

    window.LFAuth.persistAuthSession(result.user, result.token);
    sessionStorage.setItem("lf_toast", JSON.stringify({
        type: "login",
        title: "Welcome back! 👋",
        message: "You have successfully logged in to FindMyStuff."
    }));
    window.location.href = "index.html";
}

async function loginWithGoogleSimulation() {
    const seededEmail = emailInput.value.trim();
    const email = seededEmail || window.prompt("Google OAuth backend client ID missing. Enter email for development Google sign-in:");
    if (!email) {
        return;
    }

    const name = email.split("@")[0] || "Google User";

    showStatus("Completing development Google sign-in...", "info");
    const response = await fetch(API_BASE + "/auth/oauth/google/simulate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: email.trim(),
            name: name.trim()
        })
    });

    const result = await response.json().catch(function () {
        return {};
    });

    if (!response.ok) {
        throw new Error(result.message || "Google login failed");
    }

    window.LFAuth.persistAuthSession(result.user, result.token);
    sessionStorage.setItem("lf_toast", JSON.stringify({
        type: "login",
        title: "Welcome back! 👋",
        message: "You have successfully logged in to FindMyStuff."
    }));
    window.location.href = "index.html";
}

googleLoginBtn.addEventListener("click", async function () {
    try {
        const configResponse = await fetch(API_BASE + "/auth/oauth/config");
        const config = await configResponse.json().catch(function () {
            return {};
        });

        if (!config.googleClientId) {
            if (config.googleSimulationEnabled) {
                await loginWithGoogleSimulation();
                return;
            }
            throw new Error("Google OAuth is not configured on the server");
        }

        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
            throw new Error("Google Identity Services failed to load");
        }

        window.google.accounts.id.initialize({
            client_id: config.googleClientId,
            callback: function (response) {
                loginWithGoogleCredential(response.credential).catch(function (error) {
                    showStatus(error.message || "Google login failed", "error");
                });
            }
        });
        window.google.accounts.id.prompt();
    } catch (error) {
        showStatus(error.message || "Google login failed", "error");
    }
});

appleLoginBtn.addEventListener("click", async function () {
    const seededEmail = emailInput.value.trim();
    const email = seededEmail || window.prompt("Enter the email for Apple sign-in simulation:");
    if (!email) {
        return;
    }

    const name = email.split("@")[0] || "Apple User";

    try {
        showStatus("Completing Apple sign-in...", "info");
        const response = await fetch(API_BASE + "/auth/oauth/apple/simulate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email.trim(), name: name.trim() })
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Apple sign-in failed");
        }

        window.LFAuth.persistAuthSession(result.user, result.token);
        sessionStorage.setItem("lf_toast", JSON.stringify({
            type: "login",
            title: "Welcome back! 👋",
            message: "You have successfully logged in to FindMyStuff."
        }));
        window.location.href = "index.html";
    } catch (error) {
        showStatus(error.message || "Apple sign-in failed", "error");
    }
});

document.addEventListener("DOMContentLoaded", async function () {
    const user = await window.LFAuth.bootstrapUserFromToken();
    if (user) {
        window.location.href = "index.html";
    }
});
</script>

</body>
</html>
