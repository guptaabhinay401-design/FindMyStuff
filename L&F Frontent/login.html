<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sign in to your FindMyStuff account to report and find lost items on campus.">
<title>Sign In | FindMyStuff</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #1d4ed8;
    --brand-hover: #1e40af;
    --bg: #f0f4ff;
    --card: #ffffff;
    --ink: #0f172a;
    --ink2: #475569;
    --muted: #94a3b8;
    --border: #e2e8f0;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,.08);
    --red: #dc2626;
    --green: #16a34a;
    --transition: 0.18s ease;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 440px;
    padding: 2.25rem 2rem;
    animation: fadeUp 0.35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    font-size: .82rem;
    font-weight: 600;
    color: var(--brand);
    text-decoration: none;
    margin-bottom: 1.5rem;
  }
  .back-link:hover { opacity: .75; }

  .logo {
    display: flex;
    align-items: center;
    gap: .55rem;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--brand);
    margin-bottom: 1.25rem;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--brand);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: .9rem;
  }

  h1 { font-size: 1.5rem; font-weight: 800; color: var(--ink); margin-bottom: .3rem; }
  .subtitle { font-size: .875rem; color: var(--ink2); margin-bottom: 1.5rem; }

  /* Alert */
  .alert {
    display: none;
    padding: .75rem 1rem;
    border-radius: 10px;
    font-size: .85rem;
    font-weight: 500;
    margin-bottom: 1rem;
    border: 1px solid transparent;
  }
  .alert.show { display: block; }
  .alert-error   { background: #fef2f2; border-color: #fecaca; color: var(--red); }
  .alert-success { background: #f0fdf4; border-color: #bbf7d0; color: var(--green); }
  .alert-info    { background: #eff6ff; border-color: #bfdbfe; color: var(--brand); }

  /* Form */
  .form-group { margin-bottom: 1rem; }
  .form-label {
    display: block; font-size: .8rem; font-weight: 600;
    color: var(--ink2); margin-bottom: .35rem;
  }
  .input-wrap { position: relative; }
  .form-input {
    width: 100%;
    padding: .7rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: .9rem;
    font-family: inherit;
    color: var(--ink);
    background: #fff;
    transition: var(--transition);
    outline: none;
  }
  .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(29,78,216,.12); }
  .form-input.is-invalid { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.12); }
  .form-input.has-icon { padding-left: 2.6rem; }
  .input-icon {
    position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: .85rem; pointer-events: none;
  }
  .pw-toggle {
    position: absolute; right: .85rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: .85rem; padding: .2rem;
  }
  .pw-toggle:hover { color: var(--brand); }
  .field-error {
    min-height: 1rem;
    margin-top: .35rem;
    font-size: .78rem;
    color: var(--red);
    font-weight: 600;
  }

  /* Forgot row */
  .forgot-row {
    display: flex;
    justify-content: flex-end;
    margin-top: -.4rem;
    margin-bottom: .75rem;
  }
  .forgot-link {
    font-size: .8rem;
    font-weight: 600;
    color: var(--brand);
    text-decoration: none;
  }
  .forgot-link:hover { text-decoration: underline; }

  /* Buttons */
  .btn {
    width: 100%;
    padding: .8rem 1rem;
    border-radius: var(--radius);
    font-size: .9rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    display: flex; align-items: center; justify-content: center; gap: .5rem;
  }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--brand-hover); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

  .btn-google {
    background: #fff;
    color: var(--ink);
    border: 1.5px solid var(--border);
    margin-top: .5rem;
  }
  .btn-google:hover { background: #f8fafc; border-color: #94a3b8; }
  .btn-google img { width: 18px; height: 18px; }

  .divider {
    display: flex; align-items: center; gap: .75rem;
    margin: 1.25rem 0; color: var(--muted); font-size: .8rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .footer-text {
    text-align: center;
    font-size: .83rem;
    color: var(--ink2);
    margin-top: 1.25rem;
  }
  .footer-text a { color: var(--brand); font-weight: 600; text-decoration: none; }
  .footer-text a:hover { text-decoration: underline; }

  .admin-link {
    display: block;
    text-align: center;
    font-size: .75rem;
    color: var(--muted);
    margin-top: .75rem;
    text-decoration: none;
  }
  .admin-link:hover { color: var(--brand); }

  @media (max-width: 480px) {
    .card { padding: 1.75rem 1.25rem; }
  }
</style>
</head>
<body>

<div class="card">
  <a href="index.html" class="back-link">
    <i class="fa-solid fa-arrow-left" style="font-size:.75rem;"></i> Back to Home
  </a>

  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
    FindMyStuff
  </div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to your account to continue</p>

  <div id="alertBox" class="alert" role="status" aria-live="polite"></div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope input-icon"></i>
        <input class="form-input has-icon" type="email" id="email"
          placeholder="Enter your email" autocomplete="email" required>
      </div>
      <div id="emailError" class="field-error" aria-live="polite"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock input-icon"></i>
        <input class="form-input has-icon" type="password" id="password"
          placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>
      <div id="passwordError" class="field-error" aria-live="polite"></div>
    </div>

    <div class="forgot-row">
      <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
    </div>

    <button type="submit" class="btn btn-primary" id="loginBtn">
      <i class="fa-solid fa-right-to-bracket"></i>
      Sign In
    </button>
  </form>

  <div class="divider">or</div>

  <button class="btn btn-google" id="googleLoginBtn" type="button">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Continue with Google
  </button>

  <p class="footer-text">
    Don't have an account? <a href="signup.html">Create one</a>
  </p>

  <a href="admin-login.html" class="admin-link">
    <i class="fa-solid fa-shield-halved" style="font-size:.7rem;"></i> Admin login
  </a>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/auth-client.js"></script>
<script>
const API_BASE = window.LFAuth.API_BASE;
const alertBox  = document.getElementById('alertBox');
const loginBtn  = document.getElementById('loginBtn');
const pwToggle  = document.getElementById('pwToggle');
const emailEl = document.getElementById('email');
const passwordEl = document.getElementById('password');
const emailErrorEl = document.getElementById('emailError');
const passwordErrorEl = document.getElementById('passwordError');
const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function showAlert(msg, type) {
  alertBox.textContent = msg;
  alertBox.className = 'alert show alert-' + type;
}
function clearAlert() {
  alertBox.className = 'alert';
  alertBox.textContent = '';
}

function setFieldError(inputEl, errorEl, message) {
  errorEl.textContent = message || '';
  inputEl.classList.toggle('is-invalid', Boolean(message));
}

function validateLoginFields() {
  const email = emailEl.value.trim();
  const password = passwordEl.value;
  let emailError = '';
  let passwordError = '';

  if (!email) {
    emailError = 'Enter a valid email address';
  } else if (!EMAIL_REGEX.test(email)) {
    emailError = 'Enter a valid email address';
  }

  if (!password) {
    passwordError = 'Password is required';
  } else if (password.length < 6) {
    passwordError = 'Password must be at least 6 characters';
  }

  setFieldError(emailEl, emailErrorEl, emailError);
  setFieldError(passwordEl, passwordErrorEl, passwordError);
  loginBtn.disabled = Boolean(emailError || passwordError);
  return !(emailError || passwordError);
}

// Password toggle
pwToggle.addEventListener('click', function () {
  const inp = document.getElementById('password');
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  pwToggle.innerHTML = '<i class="fa-solid ' + (isText ? 'fa-eye' : 'fa-eye-slash') + '"></i>';
});

// Pre-fill email if coming from signup
const prefill = localStorage.getItem('lf_prefill_email');
if (prefill) {
  emailEl.value = prefill;
  localStorage.removeItem('lf_prefill_email');
}
emailEl.addEventListener('input', validateLoginFields);
passwordEl.addEventListener('input', validateLoginFields);
validateLoginFields();

// ── LOGIN FORM ─────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async function (e) {
  e.preventDefault();
  clearAlert();

  const email    = emailEl.value.trim();
  const password = passwordEl.value;
  if (!validateLoginFields()) return;

  loginBtn.disabled = true;
  loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

  try {
    const res  = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      // Blocked user gets a special message
      if (res.status === 403 && data.isBlocked) {
        return showAlert('Your account has been blocked by an administrator. Please contact support.', 'error');
      }
      throw new Error(data.message || 'Login failed. Please check your credentials.');
    }

    window.LFAuth.persistAuthSession(data.user, data.token);
    showAlert('Login successful! Redirecting...', 'success');
    sessionStorage.setItem('lf_toast', JSON.stringify({
      type: 'login',
      title: 'Welcome back! 👋',
      message: 'You have successfully signed in to FindMyStuff.'
    }));
    setTimeout(() => { window.location.href = 'index.html'; }, 700);
  } catch (err) {
    showAlert(err.message || 'Could not sign in. Please try again.', 'error');
  } finally {
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
    validateLoginFields();
  }
});

// ── GOOGLE LOGIN ───────────────────────────────────────
async function handleGoogleCredential(credential) {
  clearAlert();
  showAlert('Completing Google sign in...', 'info');
  try {
    const res  = await fetch(API_BASE + '/auth/oauth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential })
    });
    const data = await res.json().catch(() => ({}));
    if (res.status === 403 && data.isBlocked) {
      return showAlert('Your account has been blocked. Please contact support.', 'error');
    }
    if (!res.ok) throw new Error(data.message || 'Google sign in failed');

    window.LFAuth.persistAuthSession(data.user, data.token);
    sessionStorage.setItem('lf_toast', JSON.stringify({
      type: 'login', title: 'Welcome back! 👋',
      message: 'You have signed in via Google.'
    }));
    window.location.href = 'index.html';
  } catch (err) {
    showAlert(err.message || 'Google sign in failed.', 'error');
  }
}

document.getElementById('googleLoginBtn').addEventListener('click', async function () {
  try {
    const cfgRes = await fetch(API_BASE + '/auth/oauth/config');
    const cfg    = await cfgRes.json().catch(() => ({}));

    if (!cfg.googleClientId) {
      throw new Error('Google OAuth is not configured on this server.');
    }

    if (!window.google || !window.google.accounts) {
      throw new Error('Google Sign-In library failed to load. Please refresh.');
    }
    window.google.accounts.id.initialize({
      client_id: cfg.googleClientId,
      callback: (resp) => handleGoogleCredential(resp.credential).catch(err => showAlert(err.message, 'error'))
    });
    window.google.accounts.id.prompt();
  } catch (err) {
    showAlert(err.message || 'Google sign in failed.', 'error');
  }
});

// ── ALREADY LOGGED IN? ─────────────────────────────────
document.addEventListener('DOMContentLoaded', async function () {
  const user = await window.LFAuth.bootstrapUserFromToken();
  if (user && !user.isBlocked) {
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>
