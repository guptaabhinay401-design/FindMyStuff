<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile | FindMyStuff</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200 px-4 py-5 sm:px-6 sm:py-8">
    <div class="mx-auto w-full max-w-4xl">

        <a href="index.html" class="inline-flex items-center gap-2 rounded-md text-sm font-semibold text-blue-700 transition hover:text-blue-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            <i class="fa-solid fa-arrow-left text-xs"></i>
            <span>Back to Home</span>
        </a>

        <section class="mt-4 rounded-2xl bg-white p-5 shadow-lg sm:mt-6 sm:p-8">
            <div class="mb-6 flex items-start justify-between gap-4">
                <div>
                    <h2 class="text-xl font-bold text-[#1e3a8a] sm:text-2xl">My Profile</h2>
                    <p class="mt-1 text-sm text-slate-500">Update your account details and profile photo.</p>
                </div>
                <span id="roleBadge" class="rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-blue-700">Student</span>
            </div>

            <form id="profileForm" class="space-y-6">
                <div id="profileStatus" class="hidden rounded-lg border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>

                <div class="flex flex-col gap-6 md:flex-row md:items-start">
                    <div class="mx-auto w-full max-w-[220px] text-center md:mx-0">
                        <div class="mx-auto flex h-28 w-28 items-center justify-center overflow-hidden rounded-full bg-blue-100 text-4xl text-blue-600 ring-4 ring-blue-50">
                            <img id="profileImagePreview" class="hidden h-full w-full object-cover" alt="Profile photo preview">
                            <span id="profileIconFallback">
                                <i class="fa-solid fa-user"></i>
                            </span>
                        </div>
                        <label for="profile-photo" class="mt-3 block text-xs font-semibold uppercase tracking-wide text-gray-500">
                            Update Photo
                        </label>
                        <input id="profile-photo" type="file" accept="image/*" class="mt-2 w-full cursor-pointer rounded-lg border border-slate-200 px-3 py-2 text-sm file:mr-3 file:cursor-pointer file:rounded-md file:border-0 file:bg-blue-600 file:px-3 file:py-1.5 file:text-sm file:font-medium file:text-white hover:file:bg-blue-700">
                    </div>

                    <div class="grid flex-1 grid-cols-1 gap-4 sm:grid-cols-2">
                        <div>
                            <label for="full-name" class="mb-1 block text-sm font-medium text-gray-600">Full Name</label>
                            <input id="full-name" type="text" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm transition placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your full name">
                        </div>

                        <div>
                            <label for="email" class="mb-1 block text-sm font-medium text-gray-600">Email</label>
                            <input id="email" type="email" required class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm transition placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your email">
                        </div>

                        <div>
                            <label for="mobile" class="mb-1 block text-sm font-medium text-gray-600">Mobile Number</label>
                            <input id="mobile" type="tel" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm transition placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your mobile number">
                        </div>

                        <div>
                            <label for="college-id" class="mb-1 block text-sm font-medium text-gray-600">College ID</label>
                            <input id="college-id" type="text" class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm transition placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your college ID">
                        </div>
                    </div>
                </div>

                <div>
                    <label for="account-type" class="mb-1 block text-sm font-medium text-gray-600">Account Type</label>
                    <input id="account-type" type="text" value="Student" readonly class="w-full rounded-lg border border-slate-200 bg-slate-100 px-4 py-2.5 text-sm text-slate-600">
                </div>

                <div class="grid grid-cols-1 gap-3 pt-2 sm:grid-cols-2 lg:grid-cols-4">
                    <button id="saveProfileBtn" type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Save Changes
                    </button>

                    <button type="reset" id="resetProfileBtn" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm font-semibold text-gray-700 transition hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2">
                        Reset
                    </button>

                    <a href="change-password.html" class="w-full rounded-lg border border-blue-600 px-4 py-2.5 text-center text-sm font-semibold text-blue-700 transition hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Change Password
                    </a>

                    <button id="logoutBtn" type="button" class="w-full rounded-lg bg-red-600 px-4 py-2.5 text-center text-sm font-semibold text-white transition hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">
                        Logout
                    </button>
                </div>
            </form>
        </section>
</div>

<script src="js/auth-client.js"></script>
<script src="js/image-utils.js"></script>
<script>
const API_BASE = window.LFAuth.API_BASE;
const profileForm = document.getElementById("profileForm");
const profileStatus = document.getElementById("profileStatus");
const saveProfileBtn = document.getElementById("saveProfileBtn");
const resetProfileBtn = document.getElementById("resetProfileBtn");
const logoutBtn = document.getElementById("logoutBtn");
const profilePhotoInput = document.getElementById("profile-photo");
const profileImagePreview = document.getElementById("profileImagePreview");
const profileIconFallback = document.getElementById("profileIconFallback");
const roleBadge = document.getElementById("roleBadge");
const accountType = document.getElementById("account-type");
const fullNameInput = document.getElementById("full-name");
const emailInput = document.getElementById("email");
const mobileInput = document.getElementById("mobile");
const collegeIdInput = document.getElementById("college-id");

let currentProfileImage = "";
let initialProfileState = null;

function getToken() {
    return localStorage.getItem("lf_auth_token") || "";
}

function showStatus(message, type) {
    profileStatus.textContent = message;
    profileStatus.className = "rounded-lg border px-4 py-3 text-sm font-medium";

    if (type === "success") {
        profileStatus.classList.add("border-green-200", "bg-green-50", "text-green-700");
        return;
    }

    if (type === "error") {
        profileStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
        return;
    }

    profileStatus.classList.add("border-blue-200", "bg-blue-50", "text-blue-700");
}

function persistUser(user) {
    const storedUser = Object.assign({}, user);
    const profileImage = typeof user.profileImage === "string" ? user.profileImage.trim() : "";
    if (profileImage.startsWith("data:")) {
        storedUser.profileImage = "";
    }

    localStorage.setItem("lf_auth_user", JSON.stringify(storedUser));

    if (profileImage && !profileImage.startsWith("data:")) {
        localStorage.setItem("lf_profile_photo", profileImage);
        localStorage.setItem("lf_profile_image", profileImage);
        localStorage.setItem("lf_user_dp", profileImage);
        localStorage.setItem("lf_user_avatar", profileImage);
    } else {
        localStorage.removeItem("lf_profile_photo");
        localStorage.removeItem("lf_profile_image");
        localStorage.removeItem("lf_user_dp");
        localStorage.removeItem("lf_user_avatar");
    }
}

function clearSession() {
    localStorage.removeItem("lf_auth_token");
    localStorage.removeItem("lf_auth_user");
    localStorage.removeItem("lf_profile_photo");
    localStorage.removeItem("lf_profile_image");
    localStorage.removeItem("lf_user_dp");
    localStorage.removeItem("lf_user_avatar");
}

function renderProfileImage(image) {
    if (!image) {
        profileImagePreview.removeAttribute("src");
        profileImagePreview.classList.add("hidden");
        profileIconFallback.classList.remove("hidden");
        return;
    }

    profileImagePreview.src = image;
    profileImagePreview.classList.remove("hidden");
    profileIconFallback.classList.add("hidden");
}

function applyProfile(user) {
    initialProfileState = {
        name: user.name || "",
        email: user.email || "",
        mobile: user.mobile || "",
        collegeId: user.collegeId || "",
        profileImage: user.profileImage || "",
        role: user.role || "student"
    };

    fullNameInput.value = initialProfileState.name;
    emailInput.value = initialProfileState.email;
    mobileInput.value = initialProfileState.mobile;
    collegeIdInput.value = initialProfileState.collegeId;
    currentProfileImage = initialProfileState.profileImage;
    roleBadge.textContent = initialProfileState.role;
    accountType.value = initialProfileState.role;
    renderProfileImage(currentProfileImage);
}

async function loadProfile() {
    const token = getToken();

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    showStatus("Loading your profile...", "info");

    try {
        const response = await fetch(API_BASE + "/auth/me", {
            headers: {
                Authorization: "Bearer " + token
            }
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Could not load profile");
        }

        applyProfile(result.user || {});
        persistUser(result.user || {});
        showStatus("Profile loaded.", "success");
    } catch (error) {
        clearSession();
        showStatus(error.message || "Session expired. Please login again.", "error");
        setTimeout(function () {
            window.location.href = "login.html";
        }, 900);
    }
}

profilePhotoInput.addEventListener("change", async function () {
    const file = profilePhotoInput.files && profilePhotoInput.files[0];
    if (!file) {
        return;
    }

    try {
        showStatus("Optimizing profile image...", "info");
        currentProfileImage = await window.LFImageUtils.compressImageFile(file, {
            maxWidth: 720,
            maxHeight: 720,
            quality: 0.84,
            minCompressSizeBytes: 120 * 1024
        });
        renderProfileImage(currentProfileImage);
    } catch (error) {
        showStatus("Could not read profile image.", "error");
    }
});

profileForm.addEventListener("submit", async function (event) {
    event.preventDefault();

    const token = getToken();
    if (!token) {
        window.location.href = "login.html";
        return;
    }

    saveProfileBtn.disabled = true;
    saveProfileBtn.textContent = "Saving...";
    showStatus("Saving profile changes...", "info");

    const payload = {
        name: fullNameInput.value.trim(),
        email: emailInput.value.trim(),
        mobile: mobileInput.value.trim(),
        collegeId: collegeIdInput.value.trim(),
        profileImage: currentProfileImage
    };

    try {
        const response = await fetch(API_BASE + "/auth/profile", {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Could not save profile");
        }

        applyProfile(result.user || {});
        persistUser(result.user || {});
        showStatus("Profile updated successfully.", "success");
    } catch (error) {
        showStatus(error.message || "Could not save profile.", "error");
    } finally {
        saveProfileBtn.disabled = false;
        saveProfileBtn.textContent = "Save Changes";
    }
});

resetProfileBtn.addEventListener("click", function () {
    if (initialProfileState) {
        applyProfile(initialProfileState);
    }
    showStatus("Profile changes reset.", "info");
});

logoutBtn.addEventListener("click", function () {
    clearSession();
    window.location.href = "login.html";
});

document.addEventListener("DOMContentLoaded", loadProfile);
</script>
</body>
</html>
