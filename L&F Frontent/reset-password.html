<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | FindMyStuff</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 p-4 sm:p-6">

<main class="mx-auto max-w-xl rounded-2xl bg-white p-6 shadow-xl sm:p-8">
    <a href="login.html" class="text-sm font-medium text-blue-600 hover:underline">← Back to Login</a>

    <div class="mt-4">
        <h1 class="text-2xl font-bold text-slate-800">Reset Password</h1>
        <p class="mt-2 text-sm text-slate-600">Set a new password using the reset token from your email link.</p>
    </div>

    <form id="resetPasswordForm" class="mt-6 space-y-4">
        <div id="resetStatus" class="hidden rounded-lg border px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>

        <div>
            <label for="token" class="mb-1 block text-sm font-medium text-slate-700">Reset Token</label>
            <input id="token" type="text" required class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="newPassword" class="mb-1 block text-sm font-medium text-slate-700">New Password</label>
            <div class="relative">
                <input id="newPassword" type="password" minlength="6" required class="w-full rounded-lg border px-4 py-2.5 pr-11 outline-none focus:ring-2 focus:ring-blue-500">
                <button id="toggleResetPassword" type="button" class="absolute inset-y-0 right-0 px-3 text-gray-500 hover:text-blue-600" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <button id="resetBtn" type="submit" class="w-full rounded-lg bg-blue-600 py-3 text-sm font-semibold text-white hover:bg-blue-700">
            Reset Password
        </button>
    </form>
</main>

<script src="js/auth-client.js"></script>
<script>
const resetPasswordForm = document.getElementById("resetPasswordForm");
const resetStatus = document.getElementById("resetStatus");
const resetBtn = document.getElementById("resetBtn");
const tokenInput = document.getElementById("token");
const newPasswordInput = document.getElementById("newPassword");
const toggleResetPassword = document.getElementById("toggleResetPassword");
const API_BASE = window.LFAuth.API_BASE;

function showStatus(message, type) {
    resetStatus.textContent = message;
    resetStatus.className = "rounded-lg border px-4 py-3 text-sm font-medium";

    if (type === "success") {
        resetStatus.classList.add("border-green-200", "bg-green-50", "text-green-700");
        return;
    }

    if (type === "error") {
        resetStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
        return;
    }

    resetStatus.classList.add("border-blue-200", "bg-blue-50", "text-blue-700");
}

toggleResetPassword.addEventListener("click", function () {
    const isPassword = newPasswordInput.type === "password";
    newPasswordInput.type = isPassword ? "text" : "password";
    toggleResetPassword.innerHTML = '<i class="fa-solid ' + (isPassword ? "fa-eye-slash" : "fa-eye") + '"></i>';
});

document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    if (token) {
        tokenInput.value = token;
    }
});

resetPasswordForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    resetBtn.disabled = true;
    resetBtn.textContent = "Resetting...";
    showStatus("Resetting password...", "info");

    try {
        const response = await fetch(API_BASE + "/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                token: tokenInput.value.trim(),
                newPassword: newPasswordInput.value
            })
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Could not reset password");
        }

        window.LFAuth.persistAuthSession(result.user, result.token);
        showStatus("Password reset successful. Redirecting...", "success");
        setTimeout(function () {
            window.location.href = "index.html";
        }, 900);
    } catch (error) {
        showStatus(error.message || "Could not reset password", "error");
    } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = "Reset Password";
    }
});
</script>

</body>
</html>
