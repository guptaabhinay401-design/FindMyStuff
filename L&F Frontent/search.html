<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Search | FindMyStuff</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 px-3 py-4 sm:px-6 sm:py-7">

<main class="mx-auto w-full max-w-6xl">
  <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-blue-700 hover:underline">
    <i class="fa-solid fa-arrow-left text-xs"></i>
    <span>Back to Home</span>
  </a>

  <header class="mt-4">
    <h1 class="text-2xl font-bold text-[#1e3a8a] sm:text-3xl">Advanced Item Search</h1>
    <p id="modeHint" class="mt-1 text-sm text-slate-600">Find real reported items using keyword, category, location and date filters.</p>
  </header>

  <section class="mt-6 rounded-2xl bg-white p-4 shadow-md sm:p-6">
    <form id="searchForm" class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">

      <div>
        <label for="keyword" class="mb-1 block text-sm font-medium">Keyword</label>
        <input id="keyword" name="keyword" type="text"
        placeholder="e.g. black wallet"
        class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="category" class="mb-1 block text-sm font-medium">Category</label>
        <select id="category" name="category"
        class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All Categories</option>
          <option>Wallet</option>
          <option>Mobile Phone</option>
          <option>Keys</option>
          <option>ID Card</option>
          <option>Bag</option>
          <option>Electronics</option>
          <option>Watch</option>
          <option value="Other">Other</option>
        </select>
        <input id="customCategory" name="customCategory" type="text"
        placeholder="Enter custom category"
        class="mt-2 hidden w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="location" class="mb-1 block text-sm font-medium">Location</label>
        <select id="location" name="location"
        class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All Locations</option>
          <option>Library</option>
          <option>Cafeteria</option>
          <option>Hostel</option>
          <option>Parking Area</option>
          <option>Classroom</option>
          <option>Auditorium</option>
          <option value="Other">Other</option>
        </select>
        <input id="customLocation" name="customLocation" type="text"
        placeholder="Enter custom location"
        class="mt-2 hidden w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="itemType" class="mb-1 block text-sm font-medium">Item Type</label>
        <select id="itemType" name="itemType"
        class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All</option>
          <option value="found">Found Items</option>
          <option value="lost">Lost Reports</option>
        </select>
      </div>

      <div>
        <label for="date" class="mb-1 block text-sm font-medium">Date</label>
        <input id="date" name="date" type="date"
        class="w-full rounded-lg border px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div class="flex items-end gap-2">
        <button id="searchBtn" type="submit"
        class="w-full rounded-lg bg-blue-600 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700">
          <i class="fa-solid fa-search mr-2"></i>
          Search
        </button>
        <button id="resetBtn" type="button"
        class="rounded-lg border border-slate-300 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">
          Reset
        </button>
      </div>

    </form>
  </section>

  <section class="mt-8">
    <div class="mb-4 flex flex-wrap items-end justify-between gap-2">
      <h2 class="text-xl font-bold text-[#1e3a8a]">Search Results</h2>
      <p id="resultsCount" class="text-sm text-slate-600">Loading items...</p>
    </div>

    <div id="resultsGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-3" aria-live="polite"></div>
  </section>
</main>

<script src="js/auth-client.js"></script>
<script src="js/data-store.js"></script>
<script>
const searchForm = document.getElementById("searchForm");
const categoryField = document.getElementById("category");
const customCategory = document.getElementById("customCategory");
const locationField = document.getElementById("location");
const customLocation = document.getElementById("customLocation");
const resultsGrid = document.getElementById("resultsGrid");
const resultsCount = document.getElementById("resultsCount");
const searchBtn = document.getElementById("searchBtn");
const resetBtn = document.getElementById("resetBtn");
const modeHint = document.getElementById("modeHint");
const queryParams = new URLSearchParams(window.location.search);
const modeParam = queryParams.get("mode");
const keywordParam = queryParams.get("keyword") || "";
const typeParam = String(queryParams.get("type") || "").toLowerCase();
const liveParam = queryParams.get("live") === "1";
const defaultType = typeParam === "found" || typeParam === "lost" ? typeParam : "";
const pageMode = modeParam === "browse" ? "browse" : "search";
let liveTimerId = null;

function formatDate(dateValue) {
  const parsedDate = new Date(dateValue);
  if (Number.isNaN(parsedDate.getTime())) {
    return "Date unavailable";
  }
  return parsedDate.toLocaleDateString(undefined, {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

function toggleCustomInput(selectElement, customInput) {
  const isOther = selectElement.value === "Other";
  customInput.classList.toggle("hidden", !isOther);
  customInput.required = isOther;
  if (!isOther) {
    customInput.value = "";
  }
}

function getFieldValue(selectField, customField) {
  if (selectField.value === "Other") {
    return customField.value.trim();
  }
  return selectField.value.trim();
}

function renderEmptyState(message) {
  resultsGrid.innerHTML = `
    <div class="col-span-full rounded-xl border border-dashed border-slate-300 bg-white p-8 text-center text-slate-600">
      ${message}
    </div>
  `;
}

function renderErrorState() {
  resultsGrid.innerHTML = `
    <div class="col-span-full rounded-xl border border-red-200 bg-red-50 p-6 text-center text-red-700">
      Unable to load items right now. Please try again.
    </div>
  `;
}

function createBadge(type) {
  const badge = document.createElement("span");
  badge.className = "inline-block rounded-full px-3 py-1 text-xs font-semibold";
  if (type === "found") {
    badge.classList.add("bg-green-100", "text-green-700");
    badge.textContent = "Found Item";
  } else {
    badge.classList.add("bg-blue-100", "text-blue-700");
    badge.textContent = "Lost Report";
  }
  return badge;
}

function renderResults(items) {
  resultsGrid.innerHTML = "";
  if (!items.length) {
    renderEmptyState("No matching items found.");
    return;
  }

  const fragment = document.createDocumentFragment();

  items.forEach((item) => {
    const card = document.createElement("article");
    card.className = "rounded-xl border bg-white p-4 shadow-sm";

    const preview = document.createElement("div");
    preview.className = "mb-3 h-40 overflow-hidden rounded-lg bg-slate-100";

    if (item.image || item.fullImage) {
      const img = document.createElement("img");
      img.src = item.image || item.fullImage;
      img.alt = (item.itemName || "Item") + " photo";
      img.loading = "lazy";
      img.className = "h-full w-full object-cover";
      img.addEventListener("error", function () {
        preview.innerHTML = '<div class="flex h-full items-center justify-center text-xs font-semibold uppercase tracking-wide text-slate-500">No Photo</div>';
      });
      preview.appendChild(img);
    } else {
      preview.innerHTML = '<div class="flex h-full items-center justify-center text-xs font-semibold uppercase tracking-wide text-slate-500">No Photo</div>';
    }

    const title = document.createElement("h3");
    title.className = "text-lg font-bold text-slate-800";
    title.textContent = item.itemName || "Unnamed item";

    const meta = document.createElement("p");
    meta.className = "mt-1 text-sm text-slate-500";
    meta.textContent = (item.location || "Unknown location") + " • " + formatDate(item.date);

    const category = document.createElement("p");
    category.className = "mt-2 text-sm text-slate-600";
    category.textContent = "Category: " + (item.category || "Other");

    const desc = document.createElement("p");
    desc.className = "mt-2 text-sm text-slate-500";
    desc.textContent = item.description || "No description provided.";

    const footer = document.createElement("div");
    footer.className = "mt-4 flex items-center justify-between gap-3";
    footer.appendChild(createBadge(item.type));

    const action = document.createElement("button");
    action.type = "button";
    action.className = "rounded-lg border border-blue-200 px-3 py-1.5 text-xs font-semibold text-blue-700 hover:bg-blue-50";
    action.textContent = item.type === "found" ? "Claim Item" : "View Report";
    footer.appendChild(action);

    card.appendChild(preview);
    card.appendChild(title);
    card.appendChild(meta);
    card.appendChild(category);
    card.appendChild(desc);
    card.appendChild(footer);
    fragment.appendChild(card);
  });

  resultsGrid.appendChild(fragment);
}

async function runSearch(event) {
  if (event) {
    event.preventDefault();
  }

  searchBtn.disabled = true;
  searchBtn.textContent = "Searching...";
  resultsCount.textContent = "Searching...";

  const filters = {
    keyword: searchForm.keyword.value.trim(),
    category: getFieldValue(categoryField, customCategory),
    location: getFieldValue(locationField, customLocation),
    type: searchForm.itemType.value,
    date: searchForm.date.value
  };

  try {
    const items = await window.LFStore.searchItems(filters);
    renderResults(items);
    resultsCount.textContent = items.length + " item(s) found";
  } catch (error) {
    console.error("Search failed:", error);
    renderErrorState();
    resultsCount.textContent = "Search unavailable";
  } finally {
    searchBtn.disabled = false;
    searchBtn.innerHTML = '<i class="fa-solid fa-search mr-2"></i>Search';
  }
}

categoryField.addEventListener("change", function () {
  toggleCustomInput(categoryField, customCategory);
});

locationField.addEventListener("change", function () {
  toggleCustomInput(locationField, customLocation);
});

resetBtn.addEventListener("click", function () {
  searchForm.reset();
  if (pageMode === "search") {
    searchForm.itemType.value = defaultType;
  }
  categoryField.dispatchEvent(new Event("change"));
  locationField.dispatchEvent(new Event("change"));
  if (pageMode === "search") {
    runSearch();
  } else {
    resultsCount.textContent = "Manual mode: apply filters and click Search";
    renderEmptyState("Manual search mode active. Filters apply karke Search dabaiye.");
  }
});

searchForm.addEventListener("submit", runSearch);
document.addEventListener("DOMContentLoaded", function () {
  if (keywordParam) {
    searchForm.keyword.value = keywordParam;
  }

  categoryField.dispatchEvent(new Event("change"));
  locationField.dispatchEvent(new Event("change"));

  if (pageMode === "browse") {
    modeHint.textContent = "Browse mode: manual filters set karke Search dabaiye.";
    resultsCount.textContent = "Manual mode: no auto list";
    renderEmptyState("Manual search mode active. Filters apply karke Search dabaiye.");
    return;
  }

  if (liveParam) {
    modeHint.textContent = "Live mode: results auto-refresh every 30 seconds.";
  } else {
    modeHint.textContent = defaultType
      ? "Search mode: selected items auto loaded hain; filters se refine kar sakte ho."
      : "Search mode: all items auto loaded hain; filters se refine kar sakte ho.";
  }

  searchForm.itemType.value = defaultType;
  runSearch();

  if (liveParam) {
    liveTimerId = setInterval(runSearch, 30000);
  }
});

window.addEventListener("beforeunload", function () {
  if (liveTimerId) {
    clearInterval(liveTimerId);
  }
});
</script>
</body>
</html>
