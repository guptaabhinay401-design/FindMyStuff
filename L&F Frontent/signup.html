<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | FindMyStuff</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center p-6">

<div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl">

    <!-- Back -->
    <a href="index.html" class="text-sm text-blue-600 font-medium">
        ← Back to Home
    </a>

    <!-- Heading -->
    <div class="text-center mt-4">
        <h2 class="text-3xl font-bold text-[#1e3a8a]">Create Account</h2>
        <p class="text-gray-500 text-sm mt-1">Join the FindMyStuff system</p>
    </div>

    <!-- Email & Mobile Signup -->
    <form id="signupForm" class="mt-6 space-y-4">

        <div id="signupStatus" class="hidden rounded-lg border px-4 py-2 text-sm font-medium" role="status" aria-live="polite"></div>

        <!-- Full Name -->
        <div>
            <label class="text-sm font-medium text-gray-700">Full Name</label>
            <input id="fullName" type="text" required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            placeholder="Enter your name">
        </div>

        <!-- Email -->
        <div>
            <label class="text-sm font-medium text-gray-700">Email</label>
            <input id="email" type="email" required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            placeholder="Enter your email">
        </div>

        <!-- Mobile -->
        <div>
            <label class="text-sm font-medium text-gray-700">Mobile Number</label>
            <input id="mobile" type="tel" required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
            placeholder="+91 9999999999">
        </div>

        <!-- Password -->
        <div>
            <label class="text-sm font-medium text-gray-700">Password</label>
            <div class="relative">
                <input id="password" type="password" required minlength="6"
                class="w-full rounded-lg border px-4 py-2 pr-11 focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="Create password">
                <button id="togglePassword" type="button" class="absolute inset-y-0 right-0 px-3 text-gray-500 hover:text-blue-600" aria-label="Show password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <!-- Sign Up Button -->
        <button id="signupBtn" type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-semibold transition">
            Sign Up
        </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
        <div class="flex-1 border-b"></div>
        <span class="px-3 text-gray-400 text-sm">OR</span>
        <div class="flex-1 border-b"></div>
    </div>

    <!-- Social Login -->
    <div class="space-y-3">

        <button id="googleSignupBtn" type="button" class="w-full flex items-center justify-center gap-3 border py-2.5 rounded-lg hover:bg-gray-50 transition">
            <i class="fa-brands fa-google text-red-500 text-lg"></i>
            Continue with Google
        </button>

        <button id="appleSignupBtn" type="button" class="w-full flex items-center justify-center gap-3 border py-2.5 rounded-lg hover:bg-gray-50 transition">
            <i class="fa-brands fa-apple text-black text-lg"></i>
            Continue with Apple
        </button>

    </div>

    <!-- Already Have Account -->
    <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-600 font-medium hover:underline">
            Login
        </a>
    </p>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/auth-client.js"></script>
<script>
const signupForm = document.getElementById("signupForm");
const signupStatus = document.getElementById("signupStatus");
const signupBtn = document.getElementById("signupBtn");
const passwordInput = document.getElementById("password");
const togglePasswordBtn = document.getElementById("togglePassword");
const googleSignupBtn = document.getElementById("googleSignupBtn");
const appleSignupBtn = document.getElementById("appleSignupBtn");
const API_BASE = window.LFAuth.API_BASE;

function showStatus(message, type) {
    signupStatus.textContent = message;
    signupStatus.className = "rounded-lg border px-4 py-2 text-sm font-medium";

    if (type === "success") {
        signupStatus.classList.add("border-green-200", "bg-green-50", "text-green-700");
        return;
    }

    if (type === "error") {
        signupStatus.classList.add("border-red-200", "bg-red-50", "text-red-700");
        return;
    }

    signupStatus.classList.add("border-blue-200", "bg-blue-50", "text-blue-700");
}

signupForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    signupBtn.disabled = true;
    signupBtn.textContent = "Creating account...";
    showStatus("Submitting your details...", "info");

    const payload = {
        name: document.getElementById("fullName").value.trim(),
        email: document.getElementById("email").value.trim(),
        mobile: document.getElementById("mobile").value.trim(),
        password: document.getElementById("password").value
    };

    try {
        const response = await fetch(API_BASE + "/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Sign up failed");
        }

        window.LFAuth.persistAuthSession(result.user, result.token);
        showStatus("Account created successfully. Redirecting...", "success");
        setTimeout(function () {
            window.location.href = "index.html";
        }, 900);
    } catch (error) {
        showStatus(error.message || "Could not create account.", "error");
    } finally {
        signupBtn.disabled = false;
        signupBtn.textContent = "Sign Up";
    }
});

togglePasswordBtn.addEventListener("click", function () {
    const isPassword = passwordInput.type === "password";
    passwordInput.type = isPassword ? "text" : "password";
    togglePasswordBtn.innerHTML = '<i class="fa-solid ' + (isPassword ? "fa-eye-slash" : "fa-eye") + '"></i>';
    togglePasswordBtn.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
});

async function loginWithGoogleCredential(credential) {
    showStatus("Completing Google sign up...", "info");

    const response = await fetch(API_BASE + "/auth/oauth/google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential: credential })
    });

    const result = await response.json().catch(function () {
        return {};
    });

    if (!response.ok) {
        throw new Error(result.message || "Google sign up failed");
    }

    window.LFAuth.persistAuthSession(result.user, result.token);
    window.location.href = "index.html";
}

async function loginWithGoogleSimulation() {
    const seededEmail = document.getElementById("email").value.trim();
    const email = seededEmail || window.prompt("Google OAuth backend client ID missing. Enter email for development Google sign-in:");
    if (!email) {
        return;
    }

    const name = document.getElementById("fullName").value.trim() || email.split("@")[0] || "Google User";

    showStatus("Completing development Google sign up...", "info");
    const response = await fetch(API_BASE + "/auth/oauth/google/simulate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: email.trim(),
            name: name
        })
    });

    const result = await response.json().catch(function () {
        return {};
    });

    if (!response.ok) {
        throw new Error(result.message || "Google sign up failed");
    }

    window.LFAuth.persistAuthSession(result.user, result.token);
    window.location.href = "index.html";
}

googleSignupBtn.addEventListener("click", async function () {
    try {
        const configResponse = await fetch(API_BASE + "/auth/oauth/config");
        const config = await configResponse.json().catch(function () {
            return {};
        });

        if (!config.googleClientId) {
            if (config.googleSimulationEnabled) {
                await loginWithGoogleSimulation();
                return;
            }
            throw new Error("Google OAuth is not configured on the server");
        }

        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
            throw new Error("Google Identity Services failed to load");
        }

        window.google.accounts.id.initialize({
            client_id: config.googleClientId,
            callback: function (response) {
                loginWithGoogleCredential(response.credential).catch(function (error) {
                    showStatus(error.message || "Google sign up failed", "error");
                });
            }
        });
        window.google.accounts.id.prompt();
    } catch (error) {
        showStatus(error.message || "Google sign up failed", "error");
    }
});

appleSignupBtn.addEventListener("click", async function () {
    const seededEmail = document.getElementById("email").value.trim();
    const email = seededEmail || window.prompt("Enter the email for Apple sign-in simulation:");
    if (!email) {
        return;
    }

    const name = document.getElementById("fullName").value.trim() || email.split("@")[0] || "Apple User";

    try {
        showStatus("Completing Apple sign-up...", "info");
        const response = await fetch(API_BASE + "/auth/oauth/apple/simulate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email.trim(), name: name })
        });

        const result = await response.json().catch(function () {
            return {};
        });

        if (!response.ok) {
            throw new Error(result.message || "Apple sign up failed");
        }

        window.LFAuth.persistAuthSession(result.user, result.token);
        window.location.href = "index.html";
    } catch (error) {
        showStatus(error.message || "Apple sign up failed", "error");
    }
});

document.addEventListener("DOMContentLoaded", async function () {
    const user = await window.LFAuth.bootstrapUserFromToken();
    if (user) {
        window.location.href = "index.html";
    }
});
</script>

</body>
</html>
